<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contattaci per domande su Corri Greppi, Greppi Bike e gli eventi sportivi del Comitato Studentesco dell'I.I.S.S. Alessandro Greppi.">
    <title>Contatti | Greppi Sport</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="main-header">
        <nav class="navbar">
            <div class="logo"><a href="index.html">Greppi Sport</a></div>
            <button class="menu-toggle" id="menuToggle">☰</button>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="chi-siamo.html">Chi Siamo</a></li>
                <li><a href="sponsor.html">Sponsor</a></li>
                <li><a href="contatti.html">Contatti</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h1>Contattaci</h1>
        <p>Hai domande sugli eventi o vuoi proporti come volontario nello staff? Scrivici!</p>
        <form style="max-width: 600px; margin-top: 2rem;" onsubmit="event.preventDefault();">
            <div class="form-group">
                <label for="nome">Nome</label>
                <input id="nome" type="text" class="form-control">
            </div>
            <div class="form-group">
                <label for="email">Email (Istituzionale @issgreppi.it)</label>
                <input id="email" type="email" class="form-control">
            </div>
            <div class="form-group">
                <label for="messaggio">Messaggio</label>
                <textarea id="messaggio" class="form-control" rows="5"></textarea>
            </div>
            <button type="submit" class="btn">Invia Messaggio</button>
        </form>
    </main>
    <script src="js/main.js"></script>
</body>
</html>
